<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>log in</legend>
                <label for="UserName" >UserName:</label>
                <input id="UserName" type="text" placeholder="user name"/>
        
                <br/><br/>

                <label for="password">password:</label>
                <input type="text" placeholder="password"/>

                <br/><br/>

                <button>Login</button>
        
        </fieldset>
    </form>
    <br><br><br>

    <form action="">
        <fieldset>
            <legend>sign up</legend>
        <label for="">First Name:</label>
        <input type="text">

        <br/><br>
        <label for="">Last Name:</label>
        <input type="text">

        <br><br>
        <label for="">Email</label>
        <input type="email">

        <br><br>
        <label for="" name="phone">phone:</label>
        <input type="tel" pattern="[0-9]{10}">


        <br><br>
        <label for=" ">gender</label>
        <input type="radio" name="gender"><label for="">male</label>
        <input type="radio" name="gender"><label for="">female</label>

        <br><br>
        <label for="">Skills</label>
        <input type="checkbox"><label for="">python</label>
        <input type="checkbox"><label for="">java</label>
        <input type="checkbox"><label for="">Rust</label>
        <input type="checkbox"><label for="">C++</label>

        <br><br>
        <label for="">Qualifiacaton</label>
        <select name="" id="">
        <option value="">BCA</option>
        <option value="">MCA</option>
        <option value="">Btech</option>
        <option value="">BBA</option>
        <option value="">MBA</option>
        </select>

        <br><br>
        <label for="">DOB:</label>
        <input type="date"  max="2008-01-02">

        <br><br>
        <label for="">Address:</label>
        <textarea name="" id=""></textarea>

        <br><br>
        <label for="">photo</label>
        <input type="file" accept=" ">

        <br><br>
        <label for="">pincode:</label>
        <input type="text" pattern="[0-9]{6}">

        <br><br>
        <button>sign up</button>
        </fieldset>

    </form>

    <br><br><br>
    <form action=""></form>
    <table>

        <tr>
            <td><label for="User name:">User Name:</label></td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td><label for="password:">password:</label></td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td><label for="confirm password:">confirm password:</label></td>
            <td><input type="text"></td>
        </tr>
    </table>


    <br><br><br>
    <h2>Feedback Form</h2>
    <form action="">
        <fieldset>
            <legend>feedback form</legend>

            <label for="">Name:</label><br>
            <input type="text" max="20">

            <br><br><br>
            <label for="">email:</label><br>
            <input type="email">

            <br><br><br>
            <label for="">feedback:</label><br>
            <textarea name="" id="" minlength="10" maxlength="50"></textarea>
            
            <br><br>
            <button>submit</button>
        </fieldset>
    </form>
    
</body>
</html>
