<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section{
            border: solid red;
            height: 80vh;
        }
        .div1{
            border:solid green ;
            height: 100px;
            width: 200px;
            background-color: green;
            position: absolute;
            z-index: 6;
        }
        .div2{
            border:solid black ;
            height: 100px;
            width: 200px;
            background-color: black;
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 5;
        }
        .div3{
            border:solid pink;
            height: 100px;
            width: 200px;
            background-color: pink;
            position: absolute;
             top: 40px;
            left: 40px;
            z-index: 4;
        }
        .div4{
            border:solid red;
            height: 100px;
            width: 200px;
            background-color: red;
            position: absolute;
             top: 50px;
            left: 50px;
            
        }
    </style>
</head>
<body>
    <section>
        <div class="div1"></div>
        <div class="div2"></div>
        <div class="div3"></div>
        <div class="div4"></div>
    </section>
</body>
</html>
